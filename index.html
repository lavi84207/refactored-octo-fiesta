<!DOCTYPE html>
<html>
<head>
    <title>GadgetMart</title>
    <link rel="stylesheet" href="style.css">
    </head>


<body>

<header>
    <h1>GadgetMart</h1>
</header>

<div class="products">

    <!-- Smart Phone -->
    <div class="card">
        <img src="phone.jpg.jpeg" alt="Smart Phone">

        <p class="title">Smart Phone</p>

        <p class="price">₹1,49,900</p>

        <ul>
            <li>iPhone 17 Pro Max</li>
            <li>6.5 inch Display</li>
            <li>128GB Storage</li>
            <li>5000mAh Battery</li>
        </ul>
    </div>

    <!-- Laptop -->
    <div class="card">
        <img src="laptop.jpg.jpeg" alt="Laptop">

        <p class="title">Laptop</p>

        <p class="price">₹4,99,900</p>

        <ul>
            <li>Apple Macbook M5 Pro</li>
            <li>Intel i5 Processor</li>
            <li>8GB RAM</li>
            <li>512GB SSD</li>
        </ul>
    </div>

    <!-- Headphone -->
    <div class="card">
        <img src="headphone.jpg.jpeg" alt="Headphone">

        <p class="title">Headphone</p>

        <p class="price">₹67,990</p>

        <ul>
            <li>Apple AirPods Max 2</li>
            <li>Noise Cancellation</li>
        </ul>
    </div>

</div>

</body>
</html>
